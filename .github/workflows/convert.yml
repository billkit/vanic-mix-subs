name: convert-vanic-mix

on:
  # 每 6 小时自动跑一次
  schedule:
    - cron: "13 */6 * * *"
  # 允许 Actions 标签页手动触发
  workflow_dispatch:
  # main 分支变化时也跑 (例如改了上游 schedule)
  push:
    branches: [main]
    paths:
      - "convert.py"
      - ".github/workflows/convert.yml"

permissions:
  contents: write  # 用来 commit 转换后的 yaml

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run converter
        run: |
          set -euo pipefail
          SRC_URL="${{ vars.SRC_URL }}" python3 convert.py

      - name: Validate output YAML
        run: |
          python3 - <<'PY'
          import yaml, sys
          cfg = yaml.safe_load(open('vanic_mix_clash_subscription.yaml', encoding='utf-8'))
          assert len(cfg['proxies']) >= 50, f"代理数异常: {len(cfg['proxies'])}"
          assert len(cfg['rules']) >= 100, f"规则数异常: {len(cfg['rules'])}"
          print(f"OK proxies={len(cfg['proxies'])} rules={len(cfg['rules'])}")
          PY

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q vanic_mix_clash_subscription.yaml; then
            git add vanic_mix_clash_subscription.yaml
            git commit -m "chore: refresh vanic mix subscription" || true
            git push
            echo "Pushed update"
          else
            echo "No content change"
          fi
